repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy runs locally so it sees the project's installed dependencies.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy app
        language: system
        types: [python]
        pass_filenames: false
